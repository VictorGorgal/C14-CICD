name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ────────────────────────────────────────────────
  # JOB 1: Testes unitários
  # ────────────────────────────────────────────────
  test:
    name: Testes Unitários
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório CI/CD
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      # Prisma só precisa do schema para gerar o client - sem banco real
      - name: Gerar cliente Prisma
        run: prisma generate
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"

      - name: Criar diretório de relatórios
        run: mkdir -p reports

      - name: Executar testes com relatório XML
        run: |
          pytest tests/ \
            --tb=short \
            --junitxml=reports/test-results.xml \
            -v

      # Armazena o relatório de testes como artifact
      - name: Upload relatório de testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/test-results.xml

  # ────────────────────────────────────────────────
  # JOB 2: Build da imagem Docker
  # Roda em paralelo com o job de notificação,
  # mas só após testes passarem
  # ────────────────────────────────────────────────
  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout do repositório CI/CD
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: todo-api:${{ github.sha }}
          outputs: type=docker,dest=/tmp/image.tar

      # Armazena a imagem como artifact para o job de deploy
      - name: Upload imagem Docker
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar

  # ────────────────────────────────────────────────
  # JOB 3: Notificação por e-mail
  # Roda em PARALELO com o build (ambos dependem de test)
  # ────────────────────────────────────────────────
  notify:
    name: Notificação
    runs-on: ubuntu-latest
    needs: test
    if: always()   # roda mesmo se test falhar

    steps:
      - name: Checkout do repositório CI/CD
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Enviar notificação por e-mail
        env:
          NOTIFY_EMAIL: ${{ vars.NOTIFY_EMAIL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          PIPELINE_STATUS: ${{ needs.test.result }}
          REPO_NAME: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          echo "NOTIFY_EMAIL='${NOTIFY_EMAIL}'"
          echo "SMTP_USER='${SMTP_USER}'"
          python scripts/notify.py

  # ────────────────────────────────────────────────
  # JOB 4: Deploy - GitHub Releases
  # Depende do build E do notify (garante que só
  # versões válidas são publicadas)
  # ────────────────────────────────────────────────
  deploy:
    name: Deploy - GitHub Release
    runs-on: ubuntu-latest
    needs: [build, notify]
    if: needs.build.result == 'success'

    steps:
      - name: Download imagem Docker
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Download relatório de testes
        uses: actions/download-artifact@v4
        with:
          name: test-report
          path: /tmp

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-${{ github.sha }}
          name: "Release ${{ github.ref_name }} @ ${{ github.sha }}"
          body: |
            ## Release automática pelo pipeline CI/CD

            - **Branch:** `${{ github.ref_name }}`
            - **Commit:** `${{ github.sha }}`
            - **Projeto testado:** [Los-Gehts-backend](https://github.com/C14-INATEL/Los-Gehts-backend)

            ### Artifacts incluídos
            - `image.tar` - imagem Docker da aplicação
            - `test-results.xml` - relatório de testes unitários
          files: |
            /tmp/image.tar
            /tmp/test-results.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resumo do deploy
        run: |
          echo "## Deploy concluído com sucesso!" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** \`v1.0.0-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Projeto:** [Los-Gehts-backend](https://github.com/C14-INATEL/Los-Gehts-backend)" >> $GITHUB_STEP_SUMMARY
